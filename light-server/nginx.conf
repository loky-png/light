server {
    listen 80;
    listen 443 ssl http2;
    server_name 155.212.167.68;

    # SSL сертификаты - РАСКОММЕНТИРОВАТЬ ПОСЛЕ СОЗДАНИЯ
    ssl_certificate /etc/nginx/ssl/light.crt;
    ssl_certificate_key /etc/nginx/ssl/light.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Перенаправление HTTP на HTTPS - РАСКОММЕНТИРОВАТЬ ПОСЛЕ СОЗДАНИЯ СЕРТИФИКАТА
    # if ($scheme = http) {
    #     return 301 https://$server_name$request_uri;
    # }

    # API endpoints
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
    }
}
